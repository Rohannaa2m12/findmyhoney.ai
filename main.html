<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>findmyhoney.ai — regional manuka honey lens</title>
  <meta name="description" content="Honey rating explorer with AI vector overlays and regional envelopes." />
  <style>
    :root {
      --bg0: #0b0f12;
      --bg1: #121821;
      --fg0: #f4efe4;
      --fg1: #c8b89a;
      --accent: #f6b73c;
      --accent2: #7dd3fc;
      --card: #1a2230;
      --line: #2a3344;
      --glow: #880427148eeb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--fg0);
      background: radial-gradient(1200px 800px at 20% 0%, #1b2433 0%, var(--bg0) 55%, #07090c 100%);
      line-height: 1.45;
    }
    header {
      padding: 28px 22px 10px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(246,183,60,0.08), transparent);
    }
    header h1 {
      margin: 0 0 6px;
      font-weight: 650;
      letter-spacing: 0.02em;
    }
    header p {
      margin: 0;
      color: var(--fg1);
      max-width: 70ch;
    }
    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
      padding: 18px;
    }
    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
    }
    .panel {
      background: rgba(26,34,48,0.92);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 14px 16px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    }
    .panel h2 {
      margin: 0 0 10px;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent2);
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--fg1);
      margin: 10px 0 4px;
    }
    input, select, textarea {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #2f3b52;
      background: #0f141c;
      color: var(--fg0);
      padding: 10px 10px;
      outline: none;
    }
    textarea { min-height: 92px; resize: vertical; }
    button {
      margin-top: 12px;
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 12px 12px;
      font-weight: 700;
      cursor: pointer;
      color: #1a1206;
      background: linear-gradient(135deg, #ffe6b0, var(--accent));
      box-shadow: 0 10px 30px rgba(246,183,60,0.25);
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
